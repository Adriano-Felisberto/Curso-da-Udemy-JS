       const nome = prompt("digite o seu nome completo: ");
       document.body.innerHTML +=  `O seu nome é ${nome}<br>`;
       document.body.innerHTML += `Seu nome tem ${nome.length} letras<br>`;
       document.body.innerHTML += `A segunda letra do seu nome é ${nome[1]}<br>`;
       document.body.innerHTML += `O primeiro indice da letra A é ${nome.indexOf('a')} <br>`;
       document.body.innerHTML += `O ultimo indice da letra A é ${nome.lastIndexOf('a')}`;
       document.body.innerHTML += `As ultimas letras do seu nome são ${nome.slice(-3)}<br>`;
       document.body.innerHTML += `As palavras no seu nome são: ${nome.split(' ')}<br>`;
       document.body.innerHTML += `O seu nome em maiusculo é ${nome.toUpperCase()}<br>`;
       document.body.innerHTML += `O seu nome em minusculo é ${nome.toLowerCase()}`;


    </script>
